server {
    listen 80;
    server_name your-domain.com;

    # 访问根路径时跳转到子路径入口
    location = / {
        return 301 /class-pet-house/;
    }

    # 前端静态文件（部署在 /class-pet-house/ 子路径）
    location /class-pet-house/ {
        alias /var/www/class-pet-house/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /class-pet-house/index.html;
    }

    # 后端 API 代理
    location /class-pet-house/api/ {
        proxy_pass http://127.0.0.1:3008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 代理
    location /class-pet-house/api/sync/stream {
        proxy_pass http://127.0.0.1:3008;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # 宠物图片
    location /pet-images/ {
        proxy_pass http://127.0.0.1:3008;
    }

    location /动物图片/ {
        proxy_pass http://127.0.0.1:3008;
    }
}
